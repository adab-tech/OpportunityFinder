# Fly.io — one app serves API + static frontend on the same origin.
# See docs/DEPLOY.md for first-time setup.

app = 'opportunityfinder'
primary_region = 'lhr'

[build]
  dockerfile = 'Dockerfile'

[env]
  ENABLE_SCHEDULER = 'true'

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '20s'
    method = 'GET'
    path = '/health'

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
