services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: opportunity
      POSTGRES_PASSWORD: opportunity
      POSTGRES_DB: opportunityfinder
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U opportunity -d opportunityfinder"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+psycopg2://opportunity:opportunity@db:5432/opportunityfinder
      ENABLE_SCHEDULER: "true"
      CORS_ORIGINS: "*"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
