services:
  - type: web
    name: adab-opportunityfinder
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: opportunityfinder-db
          property: connectionString
      - key: ENABLE_SCHEDULER
        value: "true"
      - key: CORS_ORIGINS
        value: "*"

databases:
  - name: opportunityfinder-db
    plan: free
