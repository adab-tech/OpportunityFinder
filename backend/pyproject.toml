[tool.ruff]
line-length = 110
target-version = "py312"
extend-exclude = [".venv"]

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # import sorting
    "B",   # bugbear
    "UP",  # pyupgrade
]
ignore = [
    "E402", # conftest.py needs env setup before app imports
    "B008", # Depends(...) in argument defaults is the FastAPI idiom
]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-q"
