name: Deploy to Fly.io

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy adab-opportunityfinder
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to Fly.io
        run: flyctl deploy --remote-only -a adab-opportunityfinder
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Health check
        run: |
          sleep 15
          curl -fsS "https://adab-opportunityfinder.fly.dev/health"
